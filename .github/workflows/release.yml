name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read and bump version
        id: version
        run: |
          VERSION=$(tr -d '\r\n' < version.txt)
          if [[ ! "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid version format in version.txt: $VERSION"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unsupported bump type: $BUMP"; exit 1 ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > version.txt
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python3 -c "
          import json, sys
          with open('chrome/manifest.json') as f:
              m = json.load(f)
          m['version'] = '$VERSION'
          with open('chrome/manifest.json', 'w') as f:
              json.dump(m, f, indent=2, ensure_ascii=False)
          print(f'Updated manifest version to $VERSION')
          "

      - name: Package extension
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          zip -r "fa-transliterate-v${VERSION}.zip" chrome/ -x "*.DS_Store"
          cp "fa-transliterate-v${VERSION}.zip" "fa-transliterate.zip"
          echo "Packaged extension as fa-transliterate-v${VERSION}.zip"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt chrome/manifest.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "Nothing to commit"
          git push || echo "Nothing to push"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fa-transliterate-${{ steps.version.outputs.version }}
          path: fa-transliterate-v${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            fa-transliterate-v${{ steps.version.outputs.version }}.zip
            fa-transliterate.zip
